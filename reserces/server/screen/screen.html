<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<link rel="stylesheet" type="text/css" href="/index.css" />
	<title>屏幕串流</title>
	<style>
		body {
			background-color: #1a1a2e;
			color: #e0e0e0;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			margin: 0;
			padding: 16px;
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
			box-sizing: border-box;
		}

		.header {
			width: 100%;
			max-width: 740px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 10px;
			flex-wrap: wrap;
			gap: 6px;
		}

		.header-left {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.header-left h1 {
			font-size: 20px;
			margin: 0;
			color: #00d4ff;
		}

		.back-link {
			color: #888;
			font-size: 14px;
			text-decoration: none;
		}
		.back-link:hover {
			color: #00d4ff;
			text-decoration: underline;
		}

		.status-row {
			display: flex;
			gap: 16px;
			align-items: center;
		}

		.status-bar {
			display: flex;
			align-items: center;
			gap: 6px;
			font-size: 13px;
		}

		.status-dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			display: inline-block;
			flex-shrink: 0;
		}
		.status-dot.connected {
			background-color: #00e676;
			box-shadow: 0 0 6px #00e67688;
		}
		.status-dot.disconnected {
			background-color: #ff5252;
			box-shadow: 0 0 6px #ff525288;
		}
		.status-dot.connecting {
			background-color: #ffd740;
			box-shadow: 0 0 6px #ffd74088;
			animation: pulse 1s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}

		#streamContainer {
			width: 100%;
			max-width: 1280px;
			background-color: #000;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
			position: relative;
			aspect-ratio: 1280 / 720;
			touch-action: none;
		}

		#streamImage {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}

		#streamImage {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
			image-rendering: auto;
		}

		#placeholder {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			color: #555;
			font-size: 16px;
			gap: 8px;
			background-color: #111;
			transition: opacity 0.4s;
		}
		#placeholder.hidden {
			opacity: 0;
			pointer-events: none;
		}
		#placeholder .icon {
			font-size: 48px;
			opacity: 0.4;
		}
		#placeholder .hint {
			font-size: 13px;
			color: #444;
		}

		#touchDot {
			position: absolute;
			width: 20px;
			height: 20px;
			border-radius: 50%;
			background: rgba(255, 0, 0, 0.6);
			transform: translate(-50%, -50%);
			pointer-events: none;
			display: none;
			z-index: 10;
		}

		.controls {
			margin-top: 16px;
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
			justify-content: center;
		}

		.controls button {
			padding: 8px 24px;
			border: 1px solid #444;
			border-radius: 6px;
			background-color: #2a2a3e;
			color: #e0e0e0;
			font-size: 14px;
			cursor: pointer;
			transition: background-color 0.2s, border-color 0.2s;
		}
		.controls button:hover {
			background-color: #3a3a5e;
			border-color: #00d4ff;
		}
		.controls button:active {
			background-color: #4a4a6e;
		}
		.controls button.primary {
			background-color: #005c7a;
			border-color: #00d4ff;
		}
		.controls button.primary:hover {
			background-color: #007a9e;
		}
		.controls button.danger {
			border-color: #ff5252;
			color: #ff5252;
		}
		.controls button.danger:hover {
			background-color: #3a1a1a;
		}

		@media (max-width: 600px) {
			body { padding: 8px; }
			.header { flex-direction: column; align-items: flex-start; }
			.stats { flex-wrap: wrap; }
		}
	</style>
</head>

<body>
	<div class="header">
		<div class="header-left">
			<a class="back-link" href="/">← 返回</a>
			<h1>📺 屏幕串流</h1>
		</div>
		<div class="status-row">
			<div class="status-bar">
				<span class="status-dot disconnected" id="statusDot"></span>
				<span id="statusText">串流未连接</span>
			</div>
			<div class="status-bar">
				<span class="status-dot disconnected" id="touchStatusDot"></span>
				<span id="touchStatusText">触控未连接</span>
			</div>
			<div class="status-bar" style="color:#888; font-size:12px">
				<span id="fpsDisplay">--</span> FPS
				<span id="frameSizeDisplay" style="margin-left:8px">--</span>
			</div>
		</div>
	</div>

	<div class="controls">
		<button id="btnStart" class="primary">▶ 开始串流</button>
		<button id="btnStop" class="danger" disabled>■ 停止串流</button>
		<button id="btnTouchStart">✋ 连接触控</button>
		<button id="btnTouchStop" class="danger" disabled>✋ 断开触控</button>
	</div>

	<div id="streamContainer">
		<img id="streamImage" alt="屏幕串流" />
		<div id="touchDot" class="hidden"></div>
		<div id="placeholder">
			<div class="icon">🖥️</div>
			<div>点击「开始串流」连接</div>
			<div class="hint">通过 WebSocket 串流获取屏幕画面</div>
		</div>
	</div>


	<script src="screen.js" defer></script>
</body>

</html>
